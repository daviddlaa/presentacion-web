<section class="min-h-screen flex flex-col justify-center items-center text-center px-6 bg-transparent text-white">

    <!-- Título desde JSON -->

        {{ contenido.como_funciona.titulo }}
    </h2>

    <!-- Contenedor -->
    <div class="flex flex-col md:flex-row items-center gap-4 sm:gap-8 max-w-5xl w-full px-2">

        <!-- IZQUIERDA -->

            <p class="text-base sm:text-lg mb-4">

    <!-- MENSAJE FINAL -->
