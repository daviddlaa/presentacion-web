<section class="min-h-screen flex flex-col justify-center items-center text-center px-6 bg-transparent text-white">

    <!-- Título -->
    <h2 data-aos="fade-up" class="text-5xl md:text-6xl font-bold mb-10">
        Beneficios
    </h2>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl w-full px-2">

        {% for b in contenido.beneficios %}
        <div data-aos="fade-up"
             class="bg-white/10 backdrop-blur-md p-6 rounded-xl shadow-lg hover:scale-105 transition duration-300">

            <p class="text-2xl font-bold">
                {{ b }}
            </p>

        </div>
        {% endfor %}

    </div>

    <!-- Refuerzo final -->
    <div data-aos="fade-up" class="mt-10">
        <p class="text-2xl font-semibold text-purple-200">
            Todo esto empieza con una decisión.
        </p>
    </div>

</section>
