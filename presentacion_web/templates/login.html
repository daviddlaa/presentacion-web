<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Multinova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-8 text-center">
            <h1 class="text-4xl font-bold text-white mb-2">🔐 Admin</h1>
            <p class="text-blue-100">Panel de Control - Multinova</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Contraseña de Acceso</label>
                    <input type="password" name="password" placeholder="Ingresa tu contraseña" 
                           class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg transition"
                           required autofocus>
                </div>

                <!-- Error Message -->
                {% if error %}
                <div class="bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">❌ {{ error }}</p>
                </div>
                {% endif %}

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 text-lg shadow-lg">
                    🔓 Acceder al Admin
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 pt-6 border-t-2 border-gray-200 text-center">
                <a href="/" class="text-gray-600 hover:text-blue-600 font-semibold transition">
                    ← Volver a la presentación
                </a>
            </div>
        </div>
    </div>

    <!-- Security Note -->
    <div class="mt-6 text-center">
        <p class="text-white/80 text-sm">Esta es una área protegida. Solo administradores autorizados.</p>
    </div>
</div>

</body>
</html>
